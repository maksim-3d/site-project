<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация - Мессенджер</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .avatar-preview {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin: 0 auto 1rem;
      background: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      border: 3px solid var(--accent-color);
    }
    .avatar-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .avatar-preview span {
      font-size: 40px;
      opacity: 0.5;
    }
    .avatar-input {
      display: none;
    }
    .change-avatar-btn {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      padding: 0.5rem 1rem;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="register" class="auth-container">
      <h2>Создайте учетную запись</h2>
      
      <div class="avatar-preview" id="avatarPreview" onclick="document.getElementById('avatarInput').click()">
        <span>📷</span>
        <img id="avatarImg" style="display: none;">
      </div>
      <input type="file" id="avatarInput" class="avatar-input" accept="image/*">
      <button type="button" class="change-avatar-btn" onclick="document.getElementById('avatarInput').click()">Выбрать фото</button>
      
      <form id="registerForm">
        <input type="text" id="regUsername" placeholder="Имя пользователя" required minlength="5">
        <input type="password" id="regPassword" placeholder="Пароль" required>
        <button type="submit">Регистрация</button>
      </form>
      <p>Уже есть учетная запись? <a href="/login.html">Войти</a></p>
    </div>
  </div>

  <script>
    let selectedAvatar = null;
    
    document.getElementById('avatarInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        if (file.size > 5 * 1024 * 1024) {
          alert('Файл слишком большой. Максимальный размер 5MB');
          return;
        }
        if (!file.type.startsWith('image/')) {
          alert('Пожалуйста, выберите изображение');
          return;
        }
        const reader = new FileReader();
        reader.onload = function(event) {
          selectedAvatar = event.target.result;
          const avatarImg = document.getElementById('avatarImg');
          const previewSpan = document.querySelector('#avatarPreview span');
          avatarImg.src = selectedAvatar;
          avatarImg.style.display = 'block';
          previewSpan.style.display = 'none';
        };
        reader.readAsDataURL(file);
      }
    });
    
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('regUsername').value;
      const password = document.getElementById('regPassword').value;
      
      if (username.length < 5) {
        alert('Имя пользователя должно быть не менее 5 символов');
        return;
      }
      
      try {
        // Сначала регистрируем пользователя
        const response = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        if (response.ok) {
          // Если есть аватар, логинимся и обновляем профиль
          if (selectedAvatar) {
            const loginResponse = await fetch('/api/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username, password })
            });
            const loginData = await loginResponse.json();
            if (loginResponse.ok) {
              await fetch('/api/update-profile', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${loginData.token}`
                },
                body: JSON.stringify({ profile_pic: selectedAvatar })
              });
            }
          }
          alert('Регистрация успешна!');
          window.location.href = '/login.html';
        } else {
          alert(data.error);
        }
      } catch (error) {
        console.error('Registration error:', error);
        alert('Ошибка регистрации');
      }
    });
  </script>
</body>
</html>
